name = "forage-worker"
main = "src/index.ts"
compatibility_date = "2026-06-05"

[vars]
ENVIRONMENT = "development"
GITHUB_API_VERSION = "2022-11-28"
GITHUB_REDIRECT_URI = "http://127.0.0.1:8787/auth/github/callback"
WEB_ORIGIN = "http://127.0.0.1:4321"

[[durable_objects.bindings]]
name = "AUTH_COORDINATOR"
class_name = "AuthCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AuthCoordinator"]

# Uncomment and fill IDs after creating Cloudflare KV namespaces.
# [[kv_namespaces]]
# binding = "SETTINGS_KV"
# id = "<SETTINGS_KV_NAMESPACE_ID>"
#
# [[kv_namespaces]]
# binding = "SESSION_KV"
# id = "<SESSION_KV_NAMESPACE_ID>"
#
# [[kv_namespaces]]
# binding = "OAUTH_STATE_KV"
# id = "<OAUTH_STATE_KV_NAMESPACE_ID>"

[env.staging]
workers_dev = false

[env.staging.vars]
ENVIRONMENT = "staging"
GITHUB_API_VERSION = "2022-11-28"
GITHUB_REDIRECT_URI = "https://api-staging.forage.shrimpworks.dev/auth/github/callback"
WEB_ORIGIN = "https://forage-staging.shrimpworks.dev"

[[env.staging.durable_objects.bindings]]
name = "AUTH_COORDINATOR"
class_name = "AuthCoordinator"

[[env.staging.kv_namespaces]]
binding = "SETTINGS_KV"
id = "fe90c0a2a9334383b42653d5b5d370aa"

[env.production]
workers_dev = false

[env.production.vars]
ENVIRONMENT = "production"
GITHUB_API_VERSION = "2022-11-28"
GITHUB_REDIRECT_URI = "https://api.forage.shrimpworks.dev/auth/github/callback"
WEB_ORIGIN = "https://forage.shrimpworks.dev"

[[env.production.durable_objects.bindings]]
name = "AUTH_COORDINATOR"
class_name = "AuthCoordinator"

[[env.production.kv_namespaces]]
binding = "SETTINGS_KV"
id = "ee63c81acc454a78a20904ff7438bbe9"
