name: Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Tests, coverage, checks, and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      WRANGLER_SEND_METRICS: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.5
          tofu_wrapper: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check scripts
        run: npm run check:scripts

      - name: Check pre-MVP syntax
        run: npm run check:pre-mvp

      - name: Check analysis review fixture
        run: npm run check:analysis

      - name: Check docs
        run: npm run check:docs

      - name: Check workspace
        run: npm run check:workspace

      - name: Check infra formatting
        run: npm run infra:fmt:check

      - name: Test packages with coverage
        run: npm run test:coverage

      - name: Test web app
        run: npm run check:web-tests

      - name: Test Worker
        run: npm run check:worker-tests

      - name: Lint
        run: npm run lint

      - name: Check Astro formatting
        run: npm run format:astro:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke test web build
        run: npm run check:web-smoke
